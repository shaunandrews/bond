<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bond</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Bond</h1>
        <p class="tagline">Local agent · read-only tools (Read, Glob, Grep)</p>
      </header>
      <main class="chat" id="chat"></main>
      <footer class="composer">
        <textarea
          id="input"
          rows="3"
          placeholder="Ask Bond to inspect a file, e.g. summarize ~/Documents/notes.md"
          spellcheck="false"
        ></textarea>
        <div class="actions">
          <button type="button" id="cancel" class="secondary" disabled>Stop</button>
          <button type="button" id="send" class="primary">Send</button>
        </div>
      </footer>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
